<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔖 私人书签</title>
<style>
/* 深色主题变量 */
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e4e6ed; --muted: #8b8fa3; --accent: #7c3aed;
  --accent-light: #a78bfa; --green: #10b981; --red: #ef4444;
  --radius: 12px; --overlay: rgba(0,0,0,.6);
}
/* 白色主题变量 */
[data-theme="light"] {
  --bg: #f5f6f9; --card: #ffffff; --border: #e4e6ef;
  --text: #1a1d2e; --muted: #6b7080; --accent: #6d28d9;
  --accent-light: #7c3aed; --green: #059669; --red: #dc2626;
  --radius: 12px; --overlay: rgba(0,0,0,.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  transition: background .25s, color .25s;
}
/* 登录页 */
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; width: 360px; text-align: center;
}
.login-box h1 { font-size: 24px; margin-bottom: 8px; }
.login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 15px; margin-bottom: 16px;
}
.login-box button {
  width: 100%; padding: 12px; border-radius: 10px; border: 0; cursor: pointer;
  background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; transition: .2s;
}
.login-box button:hover { background: var(--accent-light); }

/* 主界面 */
.app { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; background: var(--bg); padding-top: 4px; padding-bottom: 4px; }
header h1 { font-size: 22px; white-space: nowrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px;
}
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); cursor: pointer; font-size: 13px;
  transition: .2s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent-light); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent-light); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.btn.icon { padding: 10px 12px; font-size: 16px; line-height: 1; }

/* 侧栏 + 内容 */
.layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; height: calc(100vh - 100px); }
.sidebar { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; padding-right: 4px; }
.bookmark-scroll { overflow-y: auto; padding-right: 4px; }
.sidebar-section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.cat-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
  transition: .12s; color: var(--muted);
}
.cat-item:hover { background: var(--card); color: var(--text); }
.cat-item.active { background: var(--accent); color: #fff; }
.cat-item .count { font-size: 12px; opacity: .7; }
.tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  padding: 4px 10px; border-radius: 999px; font-size: 12px; cursor: pointer;
  background: var(--card); border: 1px solid var(--border); color: var(--muted); transition: .12s;
}
.tag-chip:hover { border-color: var(--accent); color: var(--accent-light); }
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* 书签卡片 */
.bookmarks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.bookmark-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; display: flex; gap: 14px; transition: opacity .2s, transform .2s, border-color .2s; position: relative;
}
.bookmark-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.bookmark-icon { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; object-fit: contain; background: var(--bg); }
.bookmark-info { flex: 1; min-width: 0; }
.bookmark-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.bookmark-title a { color: var(--text); text-decoration: none; }
.bookmark-title a:hover { color: var(--accent-light); }
.bookmark-desc { font-size: 13px; color: var(--muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bookmark-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bookmark-category { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(124,58,237,.15); color: var(--accent-light); }
.bookmark-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--bg); color: var(--muted); }
.bookmark-actions { position: absolute; top: 12px; right: 12px; display: none; gap: 4px; }
.bookmark-card:hover .bookmark-actions { display: flex; }
.bookmark-actions button { background: 0; border: 0; cursor: pointer; color: var(--muted); font-size: 14px; padding: 4px; }
.bookmark-actions button:hover { color: var(--accent-light); }
.bookmark-actions .del:hover { color: var(--red); }

/* 弹窗 */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay); z-index: 100;
  display: flex; justify-content: center; align-items: center; padding: 20px;
}
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; width: 480px; max-width: 100%; max-height: 90vh; overflow: auto;
}
.modal h2 { font-size: 20px; margin-bottom: 20px; }
.modal .field { margin-bottom: 16px; }
.modal .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.modal .field input, .modal .field textarea, .modal .field select {
  width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
}
.modal .field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
@media (max-width: 768px) { .layout { grid-template-columns: 1fr; height: auto; } .sidebar { order: 2; overflow: visible; } .bookmark-scroll { overflow: visible; } }
</style>
<script>
(function(){try{var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>🔖 私人书签</h1>
    <p>输入访问密码进入</p>
    <input type="password" id="passwordInput" placeholder="访问密码" onkeyup="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">进入</button>
  </div>
</div>

<!-- 主界面 -->
<div class="app" id="mainApp" style="display:none">
  <header>
    <h1>🔖 私人书签</h1>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="搜索书签…" oninput="debouncedSearch()">
    </div>
    <div class="header-actions">
      <button class="btn primary" onclick="openAddModal()">+ 添加</button>
      <button class="btn" onclick="exportHTML()" title="导出为浏览器书签HTML">导出</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">导入</button>
      <input type="file" id="importFile" accept=".json,.html,.htm" style="display:none" onchange="importData(event)">
      <button class="btn icon" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <button class="btn danger" onclick="logout()">退出</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>分类</h3>
        <div id="catList"></div>
      </div>
      <div class="sidebar-section">
        <h3>标签</h3>
        <div class="tag-cloud" id="tagList"></div>
      </div>
    </div>

    <div class="bookmark-scroll">
      <div class="bookmarks-grid" id="bookmarkGrid"></div>
      <div class="empty" id="emptyState" style="display:none">还没有书签，点击「+ 添加」创建第一个吧</div>
    </div>
  </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="addModal" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">添加书签</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>URL *</label>
      <input type="url" id="urlInput" placeholder="https://example.com">
    </div>
    <div class="field">
      <label>标题 *</label>
      <input type="text" id="titleInput" placeholder="书签名称">
    </div>
    <div class="field">
      <label>描述</label>
      <textarea id="descInput" placeholder="简要描述（可选）"></textarea>
    </div>
    <div class="field">
      <label>分类</label>
      <input type="text" id="catInput" placeholder="如：工具、学习、娱乐" list="catDatalist">
      <datalist id="catDatalist"></datalist>
    </div>
    <div class="field">
      <label>标签（逗号分隔）</label>
      <input type="text" id="tagsInput" placeholder="如：前端, 设计, 灵感">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveBookmark()">保存</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem("bookmark_token") || "";
let currentCategory = "全部";
let currentTag = "";
let searchQuery = "";
let searchTimer = null;
let allBookmarks = []; // 本地缓存，减少请求

// ── 主题 ──
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.getElementById("themeToggle").textContent = next === "light" ? "🌙" : "☀️";
}
(function(){ // 初始化按钮图标
  const t = document.documentElement.getAttribute("data-theme") || "light";
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("themeToggle");
    if (btn) btn.textContent = t === "light" ? "🌙" : "☀️";
  });
})();

// ── 认证 ──
async function doLogin() {
  const pw = document.getElementById("passwordInput").value;
  if (!pw) return;
  token = pw;
  const ok = await api("GET", "/bookmarks?limit=1");
  if (ok.success !== false) {
    localStorage.setItem("bookmark_token", token);
    showApp();
  } else {
    alert("密码错误");
  }
}

function logout() {
  localStorage.removeItem("bookmark_token");
  token = "";
  location.reload();
}

// ── API ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const resp = await fetch("/api" + path, opts);
    return await resp.json();
  } catch (e) {
    return { success: false, error: e.message };
  }
}

// ── 数据加载 ──
async function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  await loadAll();
}

// 一次性加载全部书签，本地做分类/标签/搜索
async function loadAll() {
  const result = await api("GET", "/bookmarks");
  allBookmarks = result.data || [];
  renderCategories();
  renderTags();
  renderBookmarks();
}

// 从本地缓存渲染分类
function renderCategories() {
  const el = document.getElementById("catList");
  const catMap = {};
  allBookmarks.forEach(b => { catMap[b.category || "未分类"] = (catMap[b.category || "未分类"] || 0) + 1; });
  const cats = [{ category: "全部", count: allBookmarks.length }, ...Object.entries(catMap).map(([category, count]) => ({ category, count })).sort((a,b) => b.count - a.count)];
  el.innerHTML = cats.map(c =>
    `<div class="cat-item ${currentCategory === c.category ? "active" : ""}" onclick="selectCategory('${esc(c.category)}')">
      <span>${esc(c.category)}</span><span class="count">${c.count}</span>
    </div>`
  ).join("");
  document.getElementById("catDatalist").innerHTML =
    cats.filter(c => c.category !== "全部").map(c => `<option value="${esc(c.category)}">`).join("");
}

// 从本地缓存渲染标签
function renderTags() {
  const el = document.getElementById("tagList");
  const tagMap = {};
  allBookmarks.forEach(b => { (b.tags || "").split(",").forEach(t => { t = t.trim(); if (t) tagMap[t] = (tagMap[t]||0)+1; }); });
  const tags = Object.entries(tagMap).map(([name, count]) => ({ name, count })).sort((a,b) => b.count - a.count);
  if (!tags.length) { el.innerHTML = '<span style="color:var(--muted);font-size:13px">暂无标签</span>'; return; }
  el.innerHTML = tags.map(t =>
    `<span class="tag-chip ${currentTag === t.name ? "active" : ""}" onclick="selectTag('${esc(t.name)}')">${esc(t.name)} (${t.count})</span>`
  ).join("");
}

// 从本地缓存渲染书签（零网络请求）
function renderBookmarks() {
  let list = allBookmarks;
  if (currentCategory && currentCategory !== "全部") list = list.filter(b => (b.category || "未分类") === currentCategory);
  if (currentTag) list = list.filter(b => (b.tags || "").split(",").map(t => t.trim()).includes(currentTag));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b => (b.title + b.url + (b.description||"") + (b.tags||"") + (b.category||"")).toLowerCase().includes(q));
  }
  list = [...list].sort((a,b) => (b.created_at||"").localeCompare(a.created_at||""));

  const grid = document.getElementById("bookmarkGrid");
  const empty = document.getElementById("emptyState");
  if (!list.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  grid.innerHTML = list.map(b => {
    const tags = (b.tags || "").split(",").filter(Boolean).map(t => `<span class="bookmark-tag">${t.trim()}</span>`).join("");
    const favicon = b.favicon || `https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=64`;
    return `
      <div class="bookmark-card" data-id="${b.id}">
        <img class="bookmark-icon" src="${favicon}" onerror="this.style.display='none'">
        <div class="bookmark-info">
          <div class="bookmark-title"><a href="${b.url}" target="_blank" rel="noreferrer">${esc(b.title)}</a></div>
          ${b.description ? `<div class="bookmark-desc">${esc(b.description)}</div>` : ""}
          <div class="bookmark-meta">
            ${b.category ? `<span class="bookmark-category">${esc(b.category)}</span>` : ""}
            ${tags}
          </div>
        </div>
        <div class="bookmark-actions">
          <button title="编辑" onclick="openEditModal(${b.id})">✏️</button>
          <button class="del" title="删除" onclick="delBookmark(${b.id})">🗑️</button>
        </div>
      </div>`;
  }).join("");
}

// ── 筛选（纯本地，零网络）──
function selectCategory(cat) {
  currentCategory = cat;
  currentTag = "";
  document.querySelectorAll(".cat-item").forEach(el => {
    el.classList.toggle("active", el.querySelector("span").textContent === cat);
  });
  document.querySelectorAll(".tag-chip").forEach(el => el.classList.remove("active"));
  renderBookmarks();
}

function selectTag(tag) {
  currentTag = currentTag === tag ? "" : tag;
  document.querySelectorAll(".tag-chip").forEach(el => {
    el.classList.toggle("active", el.textContent.startsWith(tag) && currentTag === tag);
  });
  renderBookmarks();
}

function debouncedSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = document.getElementById("searchInput").value.trim();
    renderBookmarks();
  }, 200);
}

// ── CRUD ──
function openAddModal() {
  document.getElementById("modalTitle").textContent = "添加书签";
  document.getElementById("editId").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("titleInput").value = "";
  document.getElementById("descInput").value = "";
  document.getElementById("catInput").value = currentCategory !== "全部" ? currentCategory : "";
  document.getElementById("tagsInput").value = "";
  document.getElementById("addModal").style.display = "flex";
}

function openEditModal(id) {
  const b = allBookmarks.find(x => x.id === id);
  if (!b) return;
  document.getElementById("modalTitle").textContent = "编辑书签";
  document.getElementById("editId").value = id;
  document.getElementById("urlInput").value = b.url;
  document.getElementById("titleInput").value = b.title;
  document.getElementById("descInput").value = b.description || "";
  document.getElementById("catInput").value = b.category || "";
  document.getElementById("tagsInput").value = b.tags || "";
  document.getElementById("addModal").style.display = "flex";
}

function closeModal() { document.getElementById("addModal").style.display = "none"; }

async function saveBookmark() {
  const id = document.getElementById("editId").value;
  const data = {
    url: document.getElementById("urlInput").value.trim(),
    title: document.getElementById("titleInput").value.trim(),
    description: document.getElementById("descInput").value.trim(),
    category: document.getElementById("catInput").value.trim() || "未分类",
    tags: document.getElementById("tagsInput").value.trim(),
  };
  if (!data.url || !data.title) { alert("URL 和标题必填"); return; }
  closeModal();
  // 乐观更新
  if (id) {
    await api("PUT", "/bookmarks/" + id, data);
    const idx = allBookmarks.findIndex(b => b.id === parseInt(id));
    if (idx >= 0) allBookmarks[idx] = { ...allBookmarks[idx], ...data };
  } else {
    const result = await api("POST", "/bookmarks", data);
    if (result.success && result.data) {
      allBookmarks.unshift({ id: result.data.id, ...data, favicon: `https://www.google.com/s2/favicons?domain=${getDomain(data.url)}&sz=64`, created_at: new Date().toISOString() });
    }
  }
  renderCategories();
  renderTags();
  renderBookmarks();
}

function delBookmark(id) {
  if (!confirm("确定删除？")) return;
  // 纯前端移除，零延迟
  allBookmarks = allBookmarks.filter(b => b.id !== id);
  renderCategories();
  renderTags();
  renderBookmarks();
  // 后台静默请求，不阻塞 UI
  api("DELETE", "/bookmarks/" + id).then(result => {
    if (!result.success) { alert("删除失败，正在刷新"); loadAll(); }
  });
}

// ── 导出为 Chrome/Edge 兼容的 Netscape HTML ──
function exportHTML() {
  // 按分类分组
  const catMap = {};
  allBookmarks.forEach(b => {
    const cat = b.category || "未分类";
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(b);
  });

  const ts = Math.floor(Date.now() / 1000);
  let html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
<TITLE>Bookmarks</TITLE>
<H1>Bookmarks</H1>
<DL><p>
`;

  for (const [cat, items] of Object.entries(catMap)) {
    html += `    <DT><H3 ADD_DATE="${ts}" LAST_MODIFIED="${ts}">${esc(cat)}</H3>\n    <DL><p>\n`;
    for (const b of items) {
      const addDate = b.created_at ? Math.floor(new Date(b.created_at + "Z").getTime() / 1000) || ts : ts;
      const icon = b.favicon ? ` ICON="${esc(b.favicon)}"` : "";
      html += `        <DT><A HREF="${esc(b.url)}" ADD_DATE="${addDate}"${icon}>${esc(b.title)}</A>\n`;
    }
    html += `    </DL><p>\n`;
  }

  html += `</DL><p>\n`;

  const blob = new Blob([html], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bookmarks-" + new Date().toISOString().slice(0,10) + ".html";
  a.click();
}

// ── 导入 ──
async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  const isHTML = file.name.endsWith(".html") || file.name.endsWith(".htm");
  try {
    let result;
    if (isHTML) {
      result = await fetch("/api/import", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "text/html" },
        body: text,
      }).then(r => r.json());
    } else {
      const data = JSON.parse(text);
      result = await api("POST", "/import", data);
    }
    alert("导入成功：" + (result.imported || 0) + " 条" + (result.format === "html" ? "（来自浏览器书签）" : ""));
    await loadAll();
  } catch (e) {
    alert("导入失败：" + e.message);
  }
  event.target.value = "";
}

// ── 工具 ──
function esc(s) { return String(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getDomain(url) { try { return new URL(url).hostname; } catch { return ""; } }
