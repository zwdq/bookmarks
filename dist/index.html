<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔖 私人书签</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e4e6ed; --muted: #8b8fa3; --accent: #7c3aed;
  --accent-light: #a78bfa; --red: #ef4444; --radius: 12px; --overlay: rgba(0,0,0,.6);
}
[data-theme="light"] {
  --bg: #f5f6f9; --card: #ffffff; --border: #e4e6ef;
  --text: #1a1d2e; --muted: #6b7080; --accent: #6d28d9;
  --accent-light: #7c3aed; --red: #dc2626; --radius: 12px; --overlay: rgba(0,0,0,.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .25s, color .25s; }

.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
.login-box h1 { font-size: 24px; margin-bottom: 8px; }
.login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; margin-bottom: 16px; }
.login-box button { width: 100%; padding: 12px; border-radius: 10px; border: 0; cursor: pointer; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; transition: .2s; }
.login-box button:hover { background: var(--accent-light); }

.app { max-width: 1320px; margin: 0 auto; padding: 24px 16px; }
header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; background: var(--bg); padding: 4px 0; }
header h1 { font-size: 22px; white-space: nowrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input { width: 100%; padding: 10px 16px 10px 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 13px; transition: .2s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent-light); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent-light); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }
.btn.icon { padding: 10px 12px; font-size: 16px; line-height: 1; }
.btn.small { padding: 5px 10px; font-size: 12px; }

.layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; height: calc(100vh - 100px); }
.sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 4px; }
.sidebar-section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.sidebar-section h3 .add-btn { font-size: 14px; cursor: pointer; color: var(--accent); border: 0; background: 0; }

/* 树形目录 */
.tree { list-style: none; }
.tree-node { margin-bottom: 2px; }
.tree-row { display: flex; align-items: center; gap: 4px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--muted); transition: .12s; white-space: nowrap; }
.tree-row:hover { background: var(--card); color: var(--text); }
.tree-row.active { background: var(--accent); color: #fff; }
.tree-row .toggle { width: 16px; text-align: center; font-size: 10px; opacity: .6; flex-shrink: 0; }
.tree-row .folder-icon { font-size: 14px; flex-shrink: 0; }
.tree-row .label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tree-row .count { font-size: 11px; opacity: .6; }
.tree-row .row-actions { display: none; gap: 2px; }
.tree-row:hover .row-actions { display: flex; }
.tree-row .row-actions button { border: 0; background: 0; cursor: pointer; color: inherit; font-size: 12px; padding: 2px 4px; opacity: .7; }
.tree-row .row-actions button:hover { opacity: 1; }
.tree-children { list-style: none; margin-left: 16px; overflow: hidden; transition: max-height .2s; }

.tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip { padding: 4px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; background: var(--card); border: 1px solid var(--border); color: var(--muted); transition: .12s; }
.tag-chip:hover { border-color: var(--accent); color: var(--accent-light); }
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.bookmark-scroll { overflow-y: auto; padding-right: 4px; }
.bookmarks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.bookmark-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; gap: 14px; transition: opacity .2s, transform .2s, border-color .2s; position: relative; }
.bookmark-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.bookmark-icon { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; object-fit: contain; background: var(--bg); }
.bookmark-info { flex: 1; min-width: 0; }
.bookmark-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.bookmark-title a { color: var(--text); text-decoration: none; }
.bookmark-title a:hover { color: var(--accent-light); }
.bookmark-desc { font-size: 13px; color: var(--muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bookmark-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bookmark-category { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(124,58,237,.15); color: var(--accent-light); }
.bookmark-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--bg); color: var(--muted); }
.bookmark-actions { position: absolute; top: 12px; right: 12px; display: none; gap: 4px; }
.bookmark-card:hover .bookmark-actions { display: flex; }
.bookmark-actions button { background: 0; border: 0; cursor: pointer; color: var(--muted); font-size: 14px; padding: 4px; }
.bookmark-actions button:hover { color: var(--accent-light); }
.bookmark-actions .del:hover { color: var(--red); }

.modal-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 100; display: flex; justify-content: center; align-items: center; padding: 20px; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 480px; max-width: 100%; max-height: 90vh; overflow: auto; }
.modal h2 { font-size: 20px; margin-bottom: 20px; }
.modal .field { margin-bottom: 16px; }
.modal .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.modal .field input, .modal .field textarea, .modal .field select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; }
.modal .field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
@media (max-width: 768px) { .layout { grid-template-columns: 1fr; height: auto; } .sidebar { order: 2; overflow: visible; } .bookmark-scroll { overflow: visible; } }
</style>
<script>(function(){try{var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body>

<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>🔖 私人书签</h1>
    <p>输入访问密码进入</p>
    <input type="password" id="passwordInput" placeholder="访问密码" onkeyup="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">进入</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <header>
    <h1>🔖 私人书签</h1>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="搜索书签…" oninput="debouncedSearch()">
    </div>
    <div class="header-actions">
      <button class="btn primary" onclick="openAddModal()">+ 添加</button>
      <button class="btn" onclick="exportHTML()">导出</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">导入</button>
      <input type="file" id="importFile" accept=".json,.html,.htm" style="display:none" onchange="importData(event)">
      <button class="btn icon" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <button class="btn danger" onclick="logout()">退出</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>目录 <span style="display:flex;gap:4px;"><button class="add-btn" onclick="openFolderModal(null)" title="新建文件夹">＋</button><button class="add-btn" onclick="clearFolderBookmarks()" title="清空当前目录的书签" style="color:var(--red);">🗑</button></span></h3>
        <div id="folderTree"></div>
      </div>
      <div class="sidebar-section">
        <h3>标签</h3>
        <div class="tag-cloud" id="tagList"></div>
      </div>
    </div>

    <div class="bookmark-scroll">
      <div class="bookmarks-grid" id="bookmarkGrid"></div>
      <div class="empty" id="emptyState" style="display:none">还没有书签，点击「+ 添加」创建第一个吧</div>
    </div>
  </div>
</div>

<!-- 书签弹窗 -->
<div class="modal-overlay" id="addModal" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">添加书签</h2>
    <input type="hidden" id="editId">
    <div class="field"><label>URL *</label><input type="url" id="urlInput" placeholder="https://example.com"></div>
    <div class="field"><label>标题 *</label><input type="text" id="titleInput" placeholder="书签名称"></div>
    <div class="field"><label>描述</label><textarea id="descInput" placeholder="简要描述（可选）"></textarea></div>
    <div class="field"><label>目录</label><select id="folderSelect"></select></div>
    <div class="field"><label>标签（逗号分隔）</label><input type="text" id="tagsInput" placeholder="如：前端, 设计, 灵感"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addModal')">取消</button>
      <button class="btn primary" onclick="saveBookmark()">保存</button>
    </div>
  </div>
</div>

<!-- 文件夹弹窗 -->
<div class="modal-overlay" id="folderModal" style="display:none">
  <div class="modal">
    <h2 id="folderModalTitle">新建文件夹</h2>
    <input type="hidden" id="folderEditId">
    <div class="field"><label>名称 *</label><input type="text" id="folderNameInput" placeholder="文件夹名称"></div>
    <div class="field"><label>父目录</label><select id="folderParentSelect"></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('folderModal')">取消</button>
      <button class="btn primary" onclick="saveFolder()">保存</button>
    </div>
  </div>
</div>

<script>
// SSO: 接收来自 Dashboard 的自动登录
window.addEventListener("message", async (e) => {
  if (e.data && e.data.type === "vault-sso" && e.data.password) {
    const input = document.getElementById("passwordInput");
    if (input && !token) { input.value = e.data.password; await doLogin(); }
  }
});
let token = localStorage.getItem("bookmark_token") || "";
let allBookmarks = [];
let allFolders = [];
let currentFolderId = null; // null = 全部
let currentTag = "";
let searchQuery = "";
let searchTimer = null;
let expandedFolders = {};

// ── 主题 ──
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.getElementById("themeToggle").textContent = next === "light" ? "🌙" : "☀️";
}

// ── 认证 ──
async function doLogin() {
  const pw = document.getElementById("passwordInput").value;
  if (!pw) return;
  token = pw;
  const ok = await api("GET", "/bookmarks");
  if (ok.success !== false) { localStorage.setItem("bookmark_token", token); showApp(); }
  else alert("密码错误");
}
function logout() { localStorage.removeItem("bookmark_token"); token = ""; location.reload(); }

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  try { const resp = await fetch("/api" + path, opts); return await resp.json(); }
  catch (e) { return { success: false, error: e.message }; }
}

// ── 数据加载 ──
async function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  const t = document.documentElement.getAttribute("data-theme") || "light";
  document.getElementById("themeToggle").textContent = t === "light" ? "🌙" : "☀️";
  await loadAll();
}

async function loadAll() {
  const [bmRes, fdRes] = await Promise.all([api("GET", "/bookmarks"), api("GET", "/folders")]);
  allBookmarks = bmRes.data || [];
  allFolders = fdRes.data || [];
  renderTree();
  renderTags();
  renderBookmarks();
}

// ── 树形目录 ──
function buildTree(parentId = null) {
  return allFolders.filter(f => f.parent_id === parentId || (f.parent_id === null && parentId === null))
    .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || a.id - b.id);
}

function countBookmarks(folderId) {
  let count = allBookmarks.filter(b => b.folder_id === folderId).length;
  // 递归子文件夹
  for (const f of allFolders.filter(f => f.parent_id === folderId)) {
    count += countBookmarks(f.id);
  }
  return count;
}

function renderTree() {
  const el = document.getElementById("folderTree");
  const totalCount = allBookmarks.length;
  let html = `<ul class="tree">
    <li class="tree-node">
      <div class="tree-row ${currentFolderId === null ? 'active' : ''}" onclick="selectFolder(null)">
        <span class="folder-icon">📁</span>
        <span class="label">全部书签</span>
        <span class="count">${totalCount}</span>
      </div>
    </li>`;
  html += renderTreeChildren(null);
  html += `</ul>`;
  el.innerHTML = html;
}

function renderTreeChildren(parentId) {
  const children = buildTree(parentId);
  if (!children.length) return "";
  let html = `<ul class="tree-children">`;
  for (const f of children) {
    const isExpanded = expandedFolders[f.id] !== false; // 默认展开
    const count = countBookmarks(f.id);
    const hasChildren = allFolders.some(c => c.parent_id === f.id);
    html += `<li class="tree-node">
      <div class="tree-row ${currentFolderId === f.id ? 'active' : ''}" onclick="selectFolder(${f.id})">
        <span class="toggle" onclick="event.stopPropagation();toggleFolder(${f.id})">${hasChildren ? (isExpanded ? '▼' : '▶') : ''}</span>
        <span class="folder-icon">${hasChildren ? (isExpanded ? '📂' : '📁') : '📁'}</span>
        <span class="label">${esc(f.name)}</span>
        <span class="count">${count}</span>
        <span class="row-actions">
          <button title="新建子文件夹" onclick="event.stopPropagation();openFolderModal(${f.id})">＋</button>
          <button title="重命名" onclick="event.stopPropagation();openFolderEditModal(${f.id})">✏️</button>
          <button title="删除" onclick="event.stopPropagation();delFolder(${f.id})">🗑️</button>
        </span>
      </div>`;
    if (hasChildren && isExpanded) html += renderTreeChildren(f.id);
    html += `</li>`;
  }
  html += `</ul>`;
  return html;
}

function toggleFolder(id) {
  expandedFolders[id] = expandedFolders[id] === false ? true : false;
  renderTree();
}

function selectFolder(id) {
  currentFolderId = id;
  currentTag = "";
  renderTree();
  renderTags();
  renderBookmarks();
}

// ── 文件夹 CRUD ──
function buildFolderOptions(parentId = null, prefix = "", excludeId = null) {
  let opts = [];
  for (const f of buildTree(parentId)) {
    if (f.id !== excludeId) {
      opts.push({ id: f.id, name: prefix + f.name });
      opts = opts.concat(buildFolderOptions(f.id, prefix + "　", excludeId));
    }
  }
  return opts;
}

function refreshFolderSelects() {
  // 书签弹窗的目录下拉
  const sel = document.getElementById("folderSelect");
  const opts = [{ id: "", name: "根目录" }].concat(buildFolderOptions());
  sel.innerHTML = opts.map(o => `<option value="${o.id}">${esc(o.name)}</option>`).join("");

  // 文件夹弹窗的父目录下拉
  const psel = document.getElementById("folderParentSelect");
  const popts = [{ id: "", name: "根目录" }].concat(buildFolderOptions(null, "", null));
  psel.innerHTML = popts.map(o => `<option value="${o.id || ''}">${esc(o.name)}</option>`).join("");
}

function openFolderModal(parentId) {
  document.getElementById("folderModalTitle").textContent = "新建文件夹";
  document.getElementById("folderEditId").value = "";
  document.getElementById("folderNameInput").value = "";
  refreshFolderSelects();
  document.getElementById("folderParentSelect").value = parentId || "";
  document.getElementById("folderModal").style.display = "flex";
}

function openFolderEditModal(id) {
  const f = allFolders.find(x => x.id === id);
  if (!f) return;
  document.getElementById("folderModalTitle").textContent = "重命名文件夹";
  document.getElementById("folderEditId").value = id;
  document.getElementById("folderNameInput").value = f.name;
  refreshFolderSelects();
  document.getElementById("folderParentSelect").value = f.parent_id || "";
  document.getElementById("folderModal").style.display = "flex";
}

function closeModal(id) { document.getElementById(id).style.display = "none"; }

async function saveFolder() {
  const id = document.getElementById("folderEditId").value;
  const name = document.getElementById("folderNameInput").value.trim();
  const parentId = document.getElementById("folderParentSelect").value || null;
  if (!name) { alert("名称必填"); return; }
  closeModal("folderModal");
  if (id) {
    await api("PUT", "/folders/" + id, { name, parent_id: parentId ? parseInt(parentId) : null });
    const f = allFolders.find(x => x.id === parseInt(id));
    if (f) { f.name = name; f.parent_id = parentId ? parseInt(parentId) : null; }
  } else {
    const result = await api("POST", "/folders", { name, parent_id: parentId ? parseInt(parentId) : null });
    if (result.success) allFolders.push({ id: result.data.id, name, parent_id: parentId ? parseInt(parentId) : null, sort_order: 0 });
  }
  renderTree();
  renderBookmarks();
}

async function delFolder(id) {
  const count = countBookmarks(id);
  if (!confirm(`确定删除此文件夹？${count > 0 ? `含 ${count} 个书签将移至根目录` : ''}`)) return;
  // 乐观删除
  allFolders = allFolders.filter(f => f.id !== id);
  allBookmarks.forEach(b => { if (b.folder_id === id) b.folder_id = null; });
  if (currentFolderId === id) currentFolderId = null;
  renderTree();
  renderTags();
  renderBookmarks();
  await api("DELETE", "/folders/" + id);
}

// ── 批量清空 ──
async function clearFolderBookmarks() {
  const folderName = currentFolderId === null ? "根目录（全部）" : (allFolders.find(f => f.id === currentFolderId)?.name || "当前目录");
  const bmIds = getFolderBookmarks(currentFolderId).map(b => b.id);
  let folderIds = [];
  if (currentFolderId !== null) {
    // 递归收集当前文件夹及所有子文件夹
    function collectFolders(pid) {
      folderIds.push(pid);
      for (const f of allFolders.filter(f => f.parent_id === pid)) {
        collectFolders(f.id);
      }
    }
    collectFolders(currentFolderId);
  }
  const totalBm = bmIds.length;
  const totalFd = folderIds.length;
  if (!totalBm && !totalFd) { alert("当前目录没有书签或子目录"); return; }
  let msg = `确定清空「${folderName}」？\n`;
  if (totalBm) msg += `删除 ${totalBm} 个书签\n`;
  if (totalFd) msg += `删除 ${totalFd} 个文件夹（含子文件夹）\n`;
  msg += `此操作不可撤销！`;
  if (!confirm(msg)) return;

  // 乐观删除：书签 + 文件夹
  allBookmarks = allBookmarks.filter(b => !bmIds.includes(b.id));
  if (folderIds.length) {
    allFolders = allFolders.filter(f => !folderIds.includes(f.id));
  }
  currentFolderId = null;
  renderTree();
  renderTags();
  renderBookmarks();

  // 后台批量删除
  for (const id of bmIds) api("DELETE", "/bookmarks/" + id);
  for (const id of folderIds) api("DELETE", "/folders/" + id);
}

// ── 书签渲染 ──
function getFolderBookmarks(folderId) {
  // 递归获取文件夹及子文件夹的书签
  let items = allBookmarks.filter(b => b.folder_id === folderId);
  for (const f of allFolders.filter(f => f.parent_id === folderId)) {
    items = items.concat(getFolderBookmarks(f.id));
  }
  return items;
}

function renderBookmarks() {
  let list = currentFolderId === null ? [...allBookmarks] : getFolderBookmarks(currentFolderId);
  if (currentTag) list = list.filter(b => (b.tags || "").split(",").map(t => t.trim()).includes(currentTag));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b => (b.title + b.url + (b.description||"") + (b.tags||"") + (b.category||"")).toLowerCase().includes(q));
  }
  list.sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));

  const grid = document.getElementById("bookmarkGrid");
  const empty = document.getElementById("emptyState");
  if (!list.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  grid.innerHTML = list.map(b => {
    const tags = (b.tags || "").split(",").filter(Boolean).map(t => `<span class="bookmark-tag">${t.trim()}</span>`).join("");
    const favicon = b.favicon || `https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=64`;
    const folderName = b.folder_id ? (allFolders.find(f => f.id === b.folder_id)?.name || "") : "";
    return `
      <div class="bookmark-card" data-id="${b.id}">
        <img class="bookmark-icon" src="${favicon}" onerror="this.style.display='none'">
        <div class="bookmark-info">
          <div class="bookmark-title"><a href="${b.url}" target="_blank" rel="noreferrer">${esc(b.title)}</a></div>
          ${b.description ? `<div class="bookmark-desc">${esc(b.description)}</div>` : ""}
          <div class="bookmark-meta">
            ${folderName ? `<span class="bookmark-category">${esc(folderName)}</span>` : ""}
            ${tags}
          </div>
        </div>
        <div class="bookmark-actions">
          <button title="编辑" onclick="openEditModal(${b.id})">✏️</button>
          <button class="del" title="删除" onclick="delBookmark(${b.id})">🗑️</button>
        </div>
      </div>`;
  }).join("");
}

// ── 标签 ──
function renderTags() {
  const el = document.getElementById("tagList");
  let list = currentFolderId === null ? allBookmarks : getFolderBookmarks(currentFolderId);
  const tagMap = {};
  list.forEach(b => { (b.tags || "").split(",").forEach(t => { t = t.trim(); if (t) tagMap[t] = (tagMap[t]||0)+1; }); });
  const tags = Object.entries(tagMap).map(([name, count]) => ({ name, count })).sort((a,b) => b.count - a.count);
  if (!tags.length) { el.innerHTML = '<span style="color:var(--muted);font-size:13px">暂无标签</span>'; return; }
  el.innerHTML = tags.map(t => `<span class="tag-chip ${currentTag === t.name ? "active" : ""}" onclick="selectTag('${esc(t.name)}')">${esc(t.name)} (${t.count})</span>`).join("");
}

function selectTag(tag) {
  currentTag = currentTag === tag ? "" : tag;
  renderTags();
  renderBookmarks();
}

function debouncedSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = document.getElementById("searchInput").value.trim(); renderBookmarks(); }, 200);
}

// ── 书签 CRUD ──
function openAddModal() {
  document.getElementById("modalTitle").textContent = "添加书签";
  document.getElementById("editId").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("titleInput").value = "";
  document.getElementById("descInput").value = "";
  document.getElementById("tagsInput").value = "";
  refreshFolderSelects();
  document.getElementById("folderSelect").value = currentFolderId || "";
  document.getElementById("addModal").style.display = "flex";
}

function openEditModal(id) {
  const b = allBookmarks.find(x => x.id === id);
  if (!b) return;
  document.getElementById("modalTitle").textContent = "编辑书签";
  document.getElementById("editId").value = id;
  document.getElementById("urlInput").value = b.url;
  document.getElementById("titleInput").value = b.title;
  document.getElementById("descInput").value = b.description || "";
  document.getElementById("tagsInput").value = b.tags || "";
  refreshFolderSelects();
  document.getElementById("folderSelect").value = b.folder_id || "";
  document.getElementById("addModal").style.display = "flex";
}

async function saveBookmark() {
  const id = document.getElementById("editId").value;
  const folderId = document.getElementById("folderSelect").value || null;
  const data = {
    url: document.getElementById("urlInput").value.trim(),
    title: document.getElementById("titleInput").value.trim(),
    description: document.getElementById("descInput").value.trim(),
    category: "未分类",
    tags: document.getElementById("tagsInput").value.trim(),
    folder_id: folderId ? parseInt(folderId) : null,
  };
  if (!data.url || !data.title) { alert("URL 和标题必填"); return; }
  closeModal("addModal");
  if (id) {
    await api("PUT", "/bookmarks/" + id, data);
    const idx = allBookmarks.findIndex(b => b.id === parseInt(id));
    if (idx >= 0) allBookmarks[idx] = { ...allBookmarks[idx], ...data };
  } else {
    const result = await api("POST", "/bookmarks", data);
    if (result.success && result.data) {
      allBookmarks.unshift({ id: result.data.id, ...data, favicon: `https://www.google.com/s2/favicons?domain=${getDomain(data.url)}&sz=64`, created_at: new Date().toISOString() });
    }
  }
  renderTree();
  renderTags();
  renderBookmarks();
}

function delBookmark(id) {
  if (!confirm("确定删除？")) return;
  allBookmarks = allBookmarks.filter(b => b.id !== id);
  renderTree();
  renderTags();
  renderBookmarks();
  api("DELETE", "/bookmarks/" + id).then(r => { if (!r.success) { alert("删除失败，刷新中"); loadAll(); } });
}

// ── 导出 Chrome/Edge HTML（多层嵌套）──
function exportHTML() {
  const ts = Math.floor(Date.now() / 1000);
  let html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>\n<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n<TITLE>Bookmarks</TITLE>\n<H1>Bookmarks</H1>\n<DL><p>\n`;

  function exportFolder(folderId, indent) {
    const folders = buildTree(folderId);
    for (const f of folders) {
      html += `${indent}<DT><H3 ADD_DATE="${ts}" LAST_MODIFIED="${ts}">${esc(f.name)}</H3>\n${indent}<DL><p>\n`;
      // 该文件夹下的书签
      const bms = allBookmarks.filter(b => b.folder_id === f.id);
      for (const b of bms) {
        const addDate = b.created_at ? Math.floor(new Date(b.created_at + "Z").getTime() / 1000) || ts : ts;
        const icon = b.favicon ? ` ICON="${esc(b.favicon)}"` : "";
        html += `${indent}    <DT><A HREF="${esc(b.url)}" ADD_DATE="${addDate}"${icon}>${esc(b.title)}</A>\n`;
      }
      exportFolder(f.id, indent + "    ");
      html += `${indent}</DL><p>\n`;
    }
  }

  // 根目录书签
  const rootBms = allBookmarks.filter(b => !b.folder_id);
  for (const b of rootBms) {
    const addDate = b.created_at ? Math.floor(new Date(b.created_at + "Z").getTime() / 1000) || ts : ts;
    const icon = b.favicon ? ` ICON="${esc(b.favicon)}"` : "";
    html += `    <DT><A HREF="${esc(b.url)}" ADD_DATE="${addDate}"${icon}>${esc(b.title)}</A>\n`;
  }
  exportFolder(null, "    ");
  html += `</DL><p>\n`;

  const blob = new Blob([html], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bookmarks-" + new Date().toISOString().slice(0,10) + ".html";
  a.click();
}

// ── 导入 ──
async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  const isHTML = file.name.endsWith(".html") || file.name.endsWith(".htm");
  try {
    let result;
    if (isHTML) {
      result = await fetch("/api/import", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "text/html" },
        body: text,
      }).then(r => r.json());
    } else {
      const data = JSON.parse(text);
      result = await api("POST", "/import", data);
    }
    alert("导入成功：" + (result.imported || 0) + " 条");
    await loadAll();
  } catch (e) { alert("导入失败：" + e.message); }
  event.target.value = "";
}

// ── 工具 ──
function esc(s) { return String(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getDomain(url) { try { return new URL(url).hostname; } catch { return ""; } }

if (token) { showApp(); }
</script>
</body>
</html>
